name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-config-validate:
    runs-on: ubuntu-latest
    env:
      # Deploy CLI may gate on an account-context env var being
      # non-empty even on offline dry-runs. A dummy value is enough:
      # nothing leaves the runner. Var name is fixed by the deploy
      # toolchain.
      CLOUDFLARE_API_TOKEN: dummy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Astro produces dist/_worker.js/index.js (the entrypoint
      # wrangler.jsonc points at) and dist/ as the assets directory.
      # Build before validating so wrangler has something to point at.
      - name: install
        run: npm ci

      - name: build
        run: npm run build

      # Offline dry-run parses the deploy config, resolves the assets
      # directory, and writes the bundled output to --outdir without
      # contacting any remote service. Catches JSONC syntax errors,
      # missing required fields, invalid bindings, bad asset paths.
      - name: deploy config dry-run
        run: |
          npx --yes wrangler@latest deploy \
            --dry-run \
            --outdir=/tmp/wrangler-out

  astro-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: install
        run: npm ci

      # Astro's source-side gate — type-checks .astro frontmatter,
      # validates Content Collection schemas (frontmatter against
      # the Zod schema in src/content.config.ts), checks for broken
      # imports, missing components, and Astro-specific syntax.
      # Replaces the legacy htmlhint job (no .html source files
      # post-Astro-migration).
      - name: astro check
        run: npx astro check

  js-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Site JS is one ~150-line vanilla ES2020 file with no build
      # step. A full ESLint stack is overkill; node --check parses
      # every .js file and catches syntax errors, unterminated
      # strings, unbalanced braces. That's the gate that matters.
      - name: node --check on every site .js
        run: |
          set -eu
          # Find tracked .js files, excluding any node_modules that
          # might leak in during local dev. Fails fast on the first
          # syntax error.
          while IFS= read -r f; do
            echo "checking $f"
            node --check "$f"
          done < <(find . \
            -path ./node_modules -prune -o \
            -path ./.git -prune -o \
            -name '*.js' -type f -print)
