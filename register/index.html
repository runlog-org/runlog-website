<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Runlog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Get a Runlog API key</h1>
    <p>
      Runlog is the external-dependency knowledge layer for your agent — a cross-org
      registry of verified knowledge about public APIs, frameworks, and protocols.
      Registering gives you an API key you'll paste into your MCP client's config.
    </p>
    <form id="register-form" data-api-base="https://api.runlog.org">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
        placeholder="you@example.com"
      >
      <button type="submit">Send verification link</button>
    </form>
    <div id="status" role="status" aria-live="polite"></div>
    <footer>
      <a href="https://runlog.org">runlog.org</a>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
